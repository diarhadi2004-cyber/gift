<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جەژنانە</title>
    <style>
        body {
            background-color: #0f172a; 
            color: white;
            font-family: Tahoma, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #1e293b;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 90%;
            width: 340px;
        }
        .step { display: none; animation: fadeIn 0.5s ease; }
        .step.active { display: block; }
        
        .icon { font-size: 70px; margin-bottom: 15px; }
        h1 { font-size: 22px; color: #fbbf24; margin-bottom: 15px; }
        p { font-size: 15px; color: #cbd5e1; margin-bottom: 30px; line-height: 1.6; }
        .money-text { color: #10b981; font-size: 20px; font-weight: bold; margin-top: 15px; }
        
        button {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-family: inherit;
            font-weight: bold;
        }
        button:hover { background-color: #059669; }
        button:active { transform: scale(0.95); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="step1" class="step active">
            <div class="icon">🌙</div>
            <h1>جەژنت پیرۆز بێت</h1>
            <p>هیوادارم هەموو ڕۆژێکت جەژن و خۆشی بێت و هەمیشە سەرکەوتوو بیت.</p>
            <button onclick="nextStep(2)">دیارییەکەت بکەرەوە</button>
        </div>

        <div id="step2" class="step">
            <div class="icon">✉️</div>
            <h1>جەژنانەیەکی تایبەت</h1>
            <p>دیارییەکی بچووک لەم جەژنەدا چاوەڕێت دەکات...</p>
            <button onclick="nextStep(3)">وەرگرتنی جەژنانە</button>
        </div>

        <div id="step3" class="step">
            <div class="icon">💸</div>
            <h1>پیرۆزە!</h1>
            <p class="money-text">5000 دینار جەژنانەت بە دیاری وەرگرت!</p>
            <p style="font-size: 13px; color: #94a3b8; margin-top: 10px;">تێبینی: پارەکە تەنها لەسەر شاشەیە، داوای ڕاستەقینە مەکە 😂</p>
        </div>
    </div>

    <script>
        function nextStep(stepNumber) {
            const steps = document.querySelectorAll('.step');
            steps.forEach(step => step.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
        }
    </script>

</body>
</html>
